<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useMemo } = React;

// persistent storage backed by the phone's localStorage (private, on-device)
window.storage = {
  get: async (k) => { const v = localStorage.getItem(k); return v == null ? null : { key: k, value: v }; },
  set: async (k, v) => { localStorage.setItem(k, v); return { key: k, value: v }; },
};

// minimal lucide-style icon set (stroke = currentColor)
const Svg = (paths, opts) => function Icon({ size = 24, ...rest }) {
  const filled = opts && opts.fill;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24"
      fill={filled ? "currentColor" : "none"}
      stroke={filled ? "none" : "currentColor"}
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...rest}>
      {paths}
    </svg>
  );
};
const Flame = Svg(<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z" />);
const Moon = Svg(<path d="M12 3a6.36 6.36 0 0 0 9 9 9 9 0 1 1-9-9z" />);
const CalendarIcon = Svg(<><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M8 2v4M16 2v4M3 10h18" /></>);
const Plus = Svg(<path d="M5 12h14M12 5v14" />);
const X = Svg(<path d="M18 6 6 18M6 6l12 12" />);
const ChevronLeft = Svg(<path d="m15 18-6-6 6-6" />);
const ChevronRight = Svg(<path d="m9 18 6-6-6-6" />);
const Trash2 = Svg(<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6" />);
const Award = Svg(<><circle cx="12" cy="8" r="6" /><path d="M15.5 12.9 17 22l-5-3-5 3 1.5-9.1" /></>);
const Lock = Svg(<><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>);
const Target = Svg(<><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>);
const Activity = Svg(<path d="M22 12h-4l-3 9L9 3l-3 9H2" />);
const Zap = Svg(<path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />);
const Trophy = Svg(<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.7V17c0 .6-.5 1-1 1.2C7.9 18.8 7 20.2 7 22M14 14.7V17c0 .6.5 1 1 1.2 1.1.6 2 2 2 4.8M18 2H6v7a6 6 0 0 0 12 0V2z" />);
const Dumbbell = Svg(<><rect x="1.5" y="9" width="3.5" height="6" rx="1" /><rect x="5" y="10.5" width="2.5" height="3" /><rect x="7.5" y="10.6" width="9" height="2.8" /><rect x="16.5" y="10.5" width="2.5" height="3" /><rect x="19" y="9" width="3.5" height="6" rx="1" /></>, { fill: true });


/* ---------- theme ---------- */
const C = {
  bg: "#0e1014", panel: "#171a21", panel2: "#1e222c", line: "#2a2f3a",
  text: "#e8eaf0", muted: "#868c9b",
  work: "#fb923c", rest: "#2dd4bf", flame: "#f59e0b", gold: "#fbbf24",
};
const FONT = "ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
const MONO = "ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace";

/* ---------- date helpers (local time, no UTC drift) ---------- */
const pad = (n) => String(n).padStart(2, "0");
const dateToKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const keyToDate = (k) => { const [y, m, d] = k.split("-").map(Number); return new Date(y, m - 1, d); };
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const todayKey = () => dateToKey(new Date());
const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const DOW = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
const WEEKDAYS = ["S", "M", "T", "W", "T", "F", "S"];
const isActive = (v) => v && (v.type === "workout" || v.type === "rest");
const fmt = (n) => Number(n).toLocaleString();
const fmt1 = (n) => (Math.round(n * 10) / 10).toLocaleString();

/* ---------- stats ---------- */
function computeStats(days) {
  let totalWorkouts = 0, totalRest = 0, totalVolume = 0, maxDayVolume = 0, totalSets = 0, totalReps = 0, heaviestSet = 0, heaviestSetEx = "";
  const exCount = {}, exDisplay = {}, weekday = [0, 0, 0, 0, 0, 0, 0];
  for (const [k, v] of Object.entries(days)) {
    if (v.type === "workout") { totalWorkouts++; weekday[keyToDate(k).getDay()]++; }
    if (v.type === "rest") totalRest++;
    let dayVol = 0;
    for (const ex of v.exercises || []) {
      const nm = (ex.name || "").trim();
      if (nm) { const key = nm.toLowerCase(); exCount[key] = (exCount[key] || 0) + 1; if (!exDisplay[key]) exDisplay[key] = nm; }
      for (const s of ex.sets || []) {
        const w = Number(s.weight) || 0, r = Number(s.reps) || 0;
        if (r > 0) { totalSets++; totalReps += r; }
        dayVol += w * r;
        if (w > heaviestSet) { heaviestSet = w; heaviestSetEx = nm; }
      }
    }
    totalVolume += dayVol;
    if (dayVol > maxDayVolume) maxDayVolume = dayVol;
  }
  const active = Object.keys(days).filter((k) => isActive(days[k])).sort();
  let best = 0, run = 0, prev = null;
  for (const k of active) { const d = keyToDate(k); run = prev && (d - prev) / 864e5 === 1 ? run + 1 : 1; if (run > best) best = run; prev = d; }
  let current = 0;
  const tk = todayKey(), yk = dateToKey(addDays(new Date(), -1));
  if (active.length) {
    const last = active[active.length - 1];
    if (last === tk || last === yk) { current = 1; let cur = keyToDate(last); while (isActive(days[dateToKey(addDays(cur, -1))])) { current++; cur = addDays(cur, -1); } }
  }
  const now = new Date();
  const weekStart = addDays(new Date(now.getFullYear(), now.getMonth(), now.getDate()), -now.getDay());
  let thisWeek = 0, thisMonth = 0;
  for (const [k, v] of Object.entries(days)) {
    if (v.type !== "workout") continue;
    const d = keyToDate(k);
    if (d >= weekStart) thisWeek++;
    if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) thisMonth++;
  }
  let daysTracked = 0;
  if (active.length) daysTracked = Math.round((new Date(now.getFullYear(), now.getMonth(), now.getDate()) - keyToDate(active[0])) / 864e5) + 1;
  const weeksTracked = Math.max(1, daysTracked / 7);
  const uniqueExercises = Object.keys(exCount).length;
  let favEx = "—", favCount = 0;
  for (const key in exCount) if (exCount[key] > favCount) { favCount = exCount[key]; favEx = exDisplay[key]; }
  const maxWd = Math.max(...weekday);
  const bestIdx = maxWd > 0 ? weekday.indexOf(maxWd) : -1;
  return {
    totalWorkouts, totalRest, totalVolume, maxDayVolume, totalSets, totalReps, heaviestSet, heaviestSetEx,
    bestStreak: best, currentStreak: current, activeDays: active.length, thisWeek, thisMonth, daysTracked,
    avgPerWeek: totalWorkouts / weeksTracked, uniqueExercises, favEx, weekday, maxWd, bestIdx,
    bestWeekday: bestIdx >= 0 ? DOW[bestIdx] : "—",
    restRatio: totalRest > 0 ? totalWorkouts / totalRest : totalWorkouts,
    avgVolPerWorkout: totalWorkouts ? totalVolume / totalWorkouts : 0,
    avgSetsPerWorkout: totalWorkouts ? totalSets / totalWorkouts : 0,
  };
}

function currentStreakKeys(days) {
  const set = new Set();
  const active = Object.keys(days).filter((k) => isActive(days[k])).sort();
  if (!active.length) return set;
  const tk = todayKey(), yk = dateToKey(addDays(new Date(), -1));
  const last = active[active.length - 1];
  if (last !== tk && last !== yk) return set;
  let cur = keyToDate(last);
  while (isActive(days[dateToKey(cur)])) { set.add(dateToKey(cur)); cur = addDays(cur, -1); }
  return set;
}

/* ---------- achievements ---------- */
const ACHIEVEMENTS = [
  { id: "first", name: "First Rep", desc: "Log your first workout", icon: Dumbbell, check: (s) => s.totalWorkouts >= 1 },
  { id: "s3", name: "Getting Going", desc: "Reach a 3-day streak", icon: Flame, check: (s) => s.bestStreak >= 3 },
  { id: "s7", name: "Week Strong", desc: "Reach a 7-day streak", icon: Flame, check: (s) => s.bestStreak >= 7 },
  { id: "s14", name: "Fortnight", desc: "Reach a 14-day streak", icon: Flame, check: (s) => s.bestStreak >= 14 },
  { id: "s30", name: "Monthly Master", desc: "Reach a 30-day streak", icon: Zap, check: (s) => s.bestStreak >= 30 },
  { id: "s100", name: "Century Streak", desc: "Reach a 100-day streak", icon: Zap, check: (s) => s.bestStreak >= 100 },
  { id: "w10", name: "Perfect 10", desc: "Log 10 workouts", icon: Target, check: (s) => s.totalWorkouts >= 10 },
  { id: "w25", name: "Quarter Ton", desc: "Log 25 workouts", icon: Target, check: (s) => s.totalWorkouts >= 25 },
  { id: "w50", name: "Half Century", desc: "Log 50 workouts", icon: Award, check: (s) => s.totalWorkouts >= 50 },
  { id: "w100", name: "Centurion", desc: "Log 100 workouts", icon: Trophy, check: (s) => s.totalWorkouts >= 100 },
  { id: "rest5", name: "Rest & Recover", desc: "Log 5 rest days", icon: Moon, check: (s) => s.totalRest >= 5 },
  { id: "balance", name: "Balanced", desc: "20 workouts + 5 rest days", icon: Activity, check: (s) => s.totalWorkouts >= 20 && s.totalRest >= 5 },
  { id: "vol", name: "Heavy Day", desc: "10,000 total volume in one day", icon: Dumbbell, check: (s) => s.maxDayVolume >= 10000 },
  { id: "sets100", name: "Grinder", desc: "Log 100 total sets", icon: Target, check: (s) => s.totalSets >= 100 },
];

/* ---------- small UI bits ---------- */
function StatCard({ label, value, sub, accent, text }) {
  return (
    <div className="wt-scard">
      <div className={text ? "wt-sval txt" : "wt-sval"} style={{ color: accent || C.text }}>{value}</div>
      <div className="wt-slabel">{label}</div>
      {sub ? <div className="wt-ssub">{sub}</div> : null}
    </div>
  );
}

/* ---------- statistics view ---------- */
function StatsView({ stats, unit }) {
  const has = stats.activeDays > 0;
  return (
    <div className="wt-card">
      {!has && <div className="wt-empty" style={{ marginBottom: 18 }}>No data yet. Log a few workouts and your stats will fill in here.</div>}

      <div className="wt-highlight">
        <div>
          <div className="wt-hval">{fmt(stats.totalVolume)} <span style={{ fontSize: 16, color: C.muted }}>{unit}</span></div>
          <div className="wt-hlabel">Total weight lifted</div>
        </div>
        <Dumbbell size={40} style={{ color: C.work, opacity: 0.55 }} />
      </div>

      <div className="wt-section">
        <div className="wt-section-title"><Activity size={14} /> Training by day of week</div>
        <div className="wt-wchart">
          {stats.weekday.map((c, i) => (
            <div className="wt-wcol" key={i}>
              <div className="wt-wbararea">
                <div className="wt-wbarfill" style={{ height: (stats.maxWd ? Math.max(4, (c / stats.maxWd) * 100) : 0) + "%", background: i === stats.bestIdx ? C.flame : C.work }} />
              </div>
              <div className="wt-wnum">{c || ""}</div>
              <div className={"wt-wlabel" + (i === stats.bestIdx ? " best" : "")}>{WEEKDAYS[i]}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="wt-section">
        <div className="wt-section-title"><Flame size={14} /> Consistency</div>
        <div className="wt-sgrid">
          <StatCard label="Current streak" value={stats.currentStreak} sub="days" accent={C.flame} />
          <StatCard label="Best streak" value={stats.bestStreak} sub="days" accent={C.gold} />
          <StatCard label="Avg per week" value={fmt1(stats.avgPerWeek)} sub="workouts" accent={C.work} />
          <StatCard label="This week" value={stats.thisWeek} sub="workouts" accent={C.work} />
          <StatCard label="This month" value={stats.thisMonth} sub="workouts" accent={C.work} />
          <StatCard label="Total workouts" value={stats.totalWorkouts} accent={C.work} />
          <StatCard label="Rest days" value={stats.totalRest} accent={C.rest} />
          <StatCard label="Days tracked" value={stats.daysTracked} sub="since day one" />
          <StatCard label="Best day" value={stats.bestWeekday} sub="you train most" text />
          <StatCard label="Work : rest" value={fmt1(stats.restRatio) + " : 1"} text />
        </div>
      </div>

      <div className="wt-section">
        <div className="wt-section-title"><Dumbbell size={14} /> Lifting</div>
        <div className="wt-sgrid">
          <StatCard label="Total reps" value={fmt(stats.totalReps)} />
          <StatCard label="Total sets" value={fmt(stats.totalSets)} />
          <StatCard label={"Avg volume / workout"} value={fmt(Math.round(stats.avgVolPerWorkout))} sub={unit} accent={C.work} />
          <StatCard label="Avg sets / workout" value={fmt1(stats.avgSetsPerWorkout)} />
          <StatCard label="Heaviest set" value={fmt(stats.heaviestSet) + " " + unit} sub={stats.heaviestSetEx || "—"} accent={C.gold} />
          <StatCard label="Biggest day" value={fmt(stats.maxDayVolume)} sub={unit + " volume"} accent={C.work} />
          <StatCard label="Unique exercises" value={stats.uniqueExercises} />
          <StatCard label="Favorite lift" value={stats.favEx} sub="most logged" text />
        </div>
      </div>
    </div>
  );
}

/* ---------- day editor modal ---------- */
function DayModal({ dayKey, day, unit, onSet, onClear, onClose }) {
  const d = keyToDate(dayKey);
  const label = d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
  const type = day?.type || null;
  const notes = day?.notes || "";
  const exercises = day?.exercises || [];
  const patch = (p) => onSet(dayKey, { ...(day || { type: null, notes: "", exercises: [] }), ...p });
  const setExercises = (ex) => patch({ exercises: ex, type: "workout" });
  const addExercise = () => setExercises([...exercises, { name: "", sets: [{ weight: "", reps: "" }] }]);
  const updateExercise = (i, p) => setExercises(exercises.map((e, idx) => (idx === i ? { ...e, ...p } : e)));
  const removeExercise = (i) => setExercises(exercises.filter((_, idx) => idx !== i));
  const addSet = (i) => updateExercise(i, { sets: [...exercises[i].sets, { weight: "", reps: "" }] });
  const updateSet = (i, si, p) => updateExercise(i, { sets: exercises[i].sets.map((s, idx) => (idx === si ? { ...s, ...p } : s)) });
  const removeSet = (i, si) => updateExercise(i, { sets: exercises[i].sets.filter((_, idx) => idx !== si) });
  const dayVol = exercises.reduce((a, ex) => a + ex.sets.reduce((b, s) => b + (Number(s.weight) || 0) * (Number(s.reps) || 0), 0), 0);

  return (
    <div className="wt-overlay" onClick={onClose}>
      <div className="wt-modal" onClick={(e) => e.stopPropagation()}>
        <div className="wt-modal-head">
          <div>
            <div style={{ fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", color: C.muted }}>Log for</div>
            <div style={{ fontSize: 19, fontWeight: 700, color: C.text }}>{label}</div>
          </div>
          <button className="wt-icon" onClick={onClose} aria-label="Close"><X size={18} /></button>
        </div>
        <div className="wt-modal-body">
          <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
            <button className={`wt-type ${type === "workout" ? "on-work" : ""}`} onClick={() => patch({ type: "workout" })}><Dumbbell size={18} /> Workout</button>
            <button className={`wt-type ${type === "rest" ? "on-rest" : ""}`} onClick={() => patch({ type: "rest", exercises: [] })}><Moon size={18} /> Rest day</button>
          </div>
          {type === "workout" && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase", color: C.muted }}>Exercises</span>
                {dayVol > 0 && <span style={{ fontFamily: MONO, fontSize: 12, color: C.work }}>{dayVol.toLocaleString()} {unit} volume</span>}
              </div>
              {exercises.length === 0 && <div className="wt-empty">No exercises yet. Add your first lift below.</div>}
              {exercises.map((ex, i) => (
                <div className="wt-ex" key={i}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                    <input className="wt-input" style={{ flex: 1 }} placeholder="Exercise (e.g. Bench Press)" value={ex.name} onChange={(e) => updateExercise(i, { name: e.target.value })} />
                    <button className="wt-icon sm" onClick={() => removeExercise(i)} aria-label="Remove exercise"><Trash2 size={15} /></button>
                  </div>
                  <div className="wt-setgrid wt-sethead"><span>Set</span><span>Weight ({unit})</span><span>Reps</span><span></span></div>
                  {ex.sets.map((s, si) => (
                    <div className="wt-setgrid" key={si}>
                      <span className="wt-setno">{si + 1}</span>
                      <input className="wt-input num" inputMode="decimal" placeholder="0" value={s.weight} onChange={(e) => updateSet(i, si, { weight: e.target.value })} />
                      <input className="wt-input num" inputMode="numeric" placeholder="0" value={s.reps} onChange={(e) => updateSet(i, si, { reps: e.target.value })} />
                      <button className="wt-icon xs" onClick={() => removeSet(i, si)} aria-label="Remove set"><X size={13} /></button>
                    </div>
                  ))}
                  <button className="wt-add sm" onClick={() => addSet(i)}><Plus size={14} /> Add set</button>
                </div>
              ))}
              <button className="wt-add" onClick={addExercise}><Plus size={16} /> Add exercise</button>
            </div>
          )}
          <div>
            <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase", color: C.muted, marginBottom: 8 }}>Notes</div>
            <textarea className="wt-input" rows={3} placeholder={type === "rest" ? "How you recovered — stretching, walk, sleep…" : "How it felt, PRs, energy, what you trained…"} value={notes} onChange={(e) => patch({ notes: e.target.value })} style={{ resize: "vertical", width: "100%" }} />
          </div>
        </div>
        {(type || notes) && (
          <div className="wt-modal-foot"><button className="wt-clear" onClick={() => { onClear(dayKey); onClose(); }}>Clear this day</button></div>
        )}
      </div>
    </div>
  );
}

/* ---------- main app ---------- */
function WorkoutTracker() {
  const [data, setData] = useState({ days: {}, settings: { unit: "lbs" } });
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("calendar");
  const [month, setMonth] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const prevUnlocked = useRef(null);

  useEffect(() => {
    (async () => {
      try { if (window.storage) { const res = await window.storage.get("workout-tracker-data"); if (res && res.value) setData(JSON.parse(res.value)); } } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(async () => { try { if (window.storage) await window.storage.set("workout-tracker-data", JSON.stringify(data)); } catch (e) {} }, 400);
    return () => clearTimeout(t);
  }, [data, loaded]);

  const stats = useMemo(() => computeStats(data.days), [data.days]);
  const streakSet = useMemo(() => currentStreakKeys(data.days), [data.days]);
  const unit = data.settings?.unit || "lbs";

  useEffect(() => {
    if (!loaded) return;
    const unlocked = ACHIEVEMENTS.filter((a) => a.check(stats)).map((a) => a.id);
    if (prevUnlocked.current === null) { prevUnlocked.current = unlocked; return; }
    const fresh = unlocked.filter((id) => !prevUnlocked.current.includes(id));
    prevUnlocked.current = unlocked;
    if (fresh.length) { const a = ACHIEVEMENTS.find((x) => x.id === fresh[0]); setToast(a); const t = setTimeout(() => setToast(null), 3500); return () => clearTimeout(t); }
  }, [stats, loaded]);

  const setDay = (k, v) => setData((p) => ({ ...p, days: { ...p.days, [k]: v } }));
  const clearDay = (k) => setData((p) => { const d = { ...p.days }; delete d[k]; return { ...p, days: d }; });
  const toggleUnit = () => setData((p) => ({ ...p, settings: { ...p.settings, unit: unit === "lbs" ? "kg" : "lbs" } }));
  const resetAll = () => { setData({ days: {}, settings: { unit } }); setConfirmReset(false); };

  const first = new Date(month.y, month.m, 1);
  const daysInMonth = new Date(month.y, month.m + 1, 0).getDate();
  const lead = first.getDay();
  const cells = [];
  for (let i = 0; i < lead; i++) cells.push(null);
  for (let dd = 1; dd <= daysInMonth; dd++) cells.push(dd);
  const tk = todayKey();
  const monthWorkouts = Object.keys(data.days).filter((k) => { const x = keyToDate(k); return data.days[k].type === "workout" && x.getFullYear() === month.y && x.getMonth() === month.m; }).length;
  const unlockedCount = ACHIEVEMENTS.filter((a) => a.check(stats)).length;

  return (
    <div className="wt-root">
      <style>{css}</style>

      <div className="wt-hero">
        <div className="wt-hero-main">
          <div className="wt-flamewrap"><Flame size={30} className="wt-flame" style={{ color: stats.currentStreak > 0 ? C.flame : C.muted }} /></div>
          <div>
            <div className="wt-bignum" style={{ color: stats.currentStreak > 0 ? C.flame : C.muted }}>{stats.currentStreak}</div>
            <div className="wt-biglabel">day streak</div>
          </div>
        </div>
        <button className="wt-today" onClick={() => setSelected(todayKey())}><Plus size={17} /> Log today</button>
      </div>

      <div className="wt-tabs">
        <button className={`wt-tab ${view === "calendar" ? "active" : ""}`} onClick={() => setView("calendar")}><CalendarIcon size={16} /> Calendar</button>
        <button className={`wt-tab ${view === "stats" ? "active" : ""}`} onClick={() => setView("stats")}><Activity size={16} /> Statistics</button>
        <button className={`wt-tab ${view === "achievements" ? "active" : ""}`} onClick={() => setView("achievements")}><Trophy size={16} /> Awards <span className="wt-badge">{unlockedCount}/{ACHIEVEMENTS.length}</span></button>
        <button className="wt-unit" onClick={toggleUnit} title="Toggle units">{unit}</button>
      </div>

      {view === "calendar" && (
        <div className="wt-card">
          <div className="wt-cal-head">
            <button className="wt-icon" onClick={() => setMonth((m) => { const nm = m.m - 1; return nm < 0 ? { y: m.y - 1, m: 11 } : { y: m.y, m: nm }; })} aria-label="Previous month"><ChevronLeft size={18} /></button>
            <div className="wt-monthlabel">{MONTHS[month.m]} {month.y}<span className="wt-monthsub">{monthWorkouts} workouts</span></div>
            <button className="wt-icon" onClick={() => setMonth((m) => { const nm = m.m + 1; return nm > 11 ? { y: m.y + 1, m: 0 } : { y: m.y, m: nm }; })} aria-label="Next month"><ChevronRight size={18} /></button>
          </div>
          <div className="wt-weekrow">{WEEKDAYS.map((w, i) => <div key={i} className="wt-weekday">{w}</div>)}</div>
          <div className="wt-grid">
            {cells.map((dd, i) => {
              if (dd === null) return <div key={i} className="wt-cell empty" />;
              const key = dateToKey(new Date(month.y, month.m, dd));
              const day = data.days[key];
              const type = day?.type;
              const isToday = key === tk;
              const inStreak = streakSet.has(key);
              const hasLog = day && (day.exercises?.some((e) => e.sets?.length) || day.notes);
              return (
                <button key={i} className={`wt-cell ${type || ""} ${isToday ? "today" : ""} ${inStreak ? "instreak" : ""}`} onClick={() => setSelected(key)}>
                  <span className="wt-daynum">{dd}</span>
                  {type === "workout" && <Dumbbell size={12} className="wt-cellicon" />}
                  {type === "rest" && <Moon size={12} className="wt-cellicon" />}
                  {hasLog && <span className="wt-dot" />}
                </button>
              );
            })}
          </div>
          <div className="wt-legend">
            <span><i className="lg work" /> Workout</span>
            <span><i className="lg rest" /> Rest</span>
            <span><i className="lg streak" /> In current streak</span>
          </div>
        </div>
      )}

      {view === "stats" && <StatsView stats={stats} unit={unit} />}

      {view === "achievements" && (
        <div className="wt-card">
          <div className="wt-ach-grid">
            {ACHIEVEMENTS.map((a) => {
              const on = a.check(stats); const Icon = a.icon;
              return (
                <div className={`wt-ach ${on ? "on" : "off"}`} key={a.id}>
                  <div className="wt-ach-icon">{on ? <Icon size={22} /> : <Lock size={18} />}</div>
                  <div style={{ minWidth: 0 }}>
                    <div className="wt-ach-name">{a.name}</div>
                    <div className="wt-ach-desc">{a.desc}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="wt-foot">
        {confirmReset ? (
          <span>Erase all data? <button className="wt-link danger" onClick={resetAll}>Yes, reset</button> · <button className="wt-link" onClick={() => setConfirmReset(false)}>Cancel</button></span>
        ) : (
          <button className="wt-link" onClick={() => setConfirmReset(true)}>Reset all data</button>
        )}
      </div>

      {selected && <DayModal dayKey={selected} day={data.days[selected]} unit={unit} onSet={setDay} onClear={clearDay} onClose={() => setSelected(null)} />}

      {toast && (
        <div className="wt-toast">
          <div className="wt-toast-icon"><Trophy size={18} /></div>
          <div>
            <div style={{ fontSize: 10, letterSpacing: 1.2, textTransform: "uppercase", color: C.gold }}>Achievement unlocked</div>
            <div style={{ fontWeight: 700, fontSize: 14 }}>{toast.name}</div>
          </div>
        </div>
      )}
    </div>
  );
}
