<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Streak - Workout Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streak">
<meta name="theme-color" content="#0e1014">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
html,body{margin:0;background:#0e1014;-webkit-text-size-adjust:100%;}
body{min-height:100vh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}

.wt-root{font-family:ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;background:#0e1014;color:#e8eaf0;padding:20px;border-radius:20px;max-width:820px;margin:0 auto;min-height:520px;}
.wt-root *{box-sizing:border-box;}
.wt-root button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

.wt-hero{background:linear-gradient(135deg,#1a1e27 0%,#141821 100%);border:1px solid #2a2f3a;border-radius:16px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.wt-hero-main{display:flex;align-items:center;gap:14px;}
.wt-flamewrap{width:52px;height:52px;border-radius:14px;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;}
.wt-flame{animation:flick 2.6s ease-in-out infinite;transform-origin:center bottom;}
.wt-bignum{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:44px;font-weight:800;line-height:0.95;}
.wt-biglabel{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#868c9b;margin-top:2px;}
.wt-today{display:flex;align-items:center;gap:8px;padding:12px 18px;border-radius:12px;background:rgba(251,146,60,0.14);color:#fb923c;font-weight:700;font-size:14px;border:1px solid rgba(251,146,60,0.4);transition:all .15s;}
.wt-today:hover{background:rgba(251,146,60,0.22);}

.wt-tabs{display:flex;gap:8px;margin:16px 0;align-items:center;flex-wrap:wrap;}
.wt-tab{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:11px;color:#868c9b;font-size:14px;font-weight:600;transition:all .15s;border:1px solid transparent;}
.wt-tab:hover{color:#e8eaf0;background:#171a21;}
.wt-tab.active{color:#e8eaf0;background:#171a21;border-color:#2a2f3a;}
.wt-badge{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:11px;background:#1e222c;padding:2px 7px;border-radius:20px;color:#fbbf24;}
.wt-unit{margin-left:auto;font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:12px;font-weight:700;color:#868c9b;padding:8px 12px;border-radius:10px;border:1px solid #2a2f3a;text-transform:uppercase;transition:all .15s;}
.wt-unit:hover{color:#e8eaf0;border-color:#fb923c;}

.wt-card{background:#171a21;border:1px solid #2a2f3a;border-radius:16px;padding:18px;}

.wt-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.wt-monthlabel{font-size:17px;font-weight:700;text-align:center;display:flex;flex-direction:column;}
.wt-monthsub{font-size:11px;font-weight:500;color:#868c9b;letter-spacing:.5px;margin-top:2px;}
.wt-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#868c9b;transition:all .15s;}
.wt-icon:hover{background:#1e222c;color:#e8eaf0;}
.wt-icon.sm{width:30px;height:30px;}
.wt-icon.xs{width:26px;height:26px;}

.wt-weekrow,.wt-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.wt-weekday{text-align:center;font-size:11px;font-weight:700;color:#868c9b;padding-bottom:6px;}
.wt-cell{position:relative;aspect-ratio:1;border-radius:11px;background:#1e222c;border:1px solid transparent;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;padding:7px 8px;transition:all .13s;min-width:0;}
.wt-cell.empty{background:transparent;pointer-events:none;}
.wt-cell:hover{transform:translateY(-2px);border-color:#2a2f3a;}
.wt-cell .wt-daynum{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:13px;font-weight:600;color:#e8eaf0;}
.wt-cell.workout{background:linear-gradient(160deg,rgba(251,146,60,0.22),rgba(251,146,60,0.06));box-shadow:inset 0 0 0 1px rgba(251,146,60,0.35);}
.wt-cell.rest{background:linear-gradient(160deg,rgba(45,212,191,0.2),rgba(45,212,191,0.05));box-shadow:inset 0 0 0 1px rgba(45,212,191,0.32);}
.wt-cell.today{border-color:#e8eaf0;}
.wt-cell.today .wt-daynum{color:#fff;}
.wt-cell.instreak::after{content:"";position:absolute;left:8px;right:8px;bottom:5px;height:2px;border-radius:2px;background:#f59e0b;opacity:.7;}
.wt-cellicon{position:absolute;top:8px;right:7px;}
.wt-cell.workout .wt-cellicon{color:#fb923c;}
.wt-cell.rest .wt-cellicon{color:#2dd4bf;}
.wt-dot{position:absolute;bottom:7px;left:8px;width:5px;height:5px;border-radius:50%;background:#868c9b;}
.wt-cell.workout .wt-dot{background:#fb923c;}
.wt-cell.instreak .wt-dot{display:none;}

.wt-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;font-size:12px;color:#868c9b;}
.wt-legend span{display:flex;align-items:center;gap:6px;}
.wt-legend .lg{width:11px;height:11px;border-radius:4px;display:inline-block;}
.lg.work{background:#fb923c;}.lg.rest{background:#2dd4bf;}.lg.streak{background:#f59e0b;}

.wt-highlight{background:linear-gradient(135deg,rgba(251,146,60,0.16),rgba(251,146,60,0.03));border:1px solid rgba(251,146,60,0.35);border-radius:15px;padding:18px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.wt-hval{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:34px;font-weight:800;color:#fb923c;line-height:1;}
.wt-hlabel{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#868c9b;margin-top:7px;}

.wt-section{margin-bottom:22px;}
.wt-section:last-child{margin-bottom:0;}
.wt-section-title{font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:#868c9b;margin:0 0 12px 2px;font-weight:700;display:flex;align-items:center;gap:8px;}
.wt-sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.wt-scard{background:#1e222c;border:1px solid #2a2f3a;border-radius:13px;padding:14px;}
.wt-sval{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:24px;font-weight:800;line-height:1.05;}
.wt-sval.txt{font-family:ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;font-size:17px;font-weight:700;overflow-wrap:anywhere;}
.wt-slabel{font-size:11px;color:#868c9b;margin-top:7px;letter-spacing:.3px;}
.wt-ssub{font-size:11px;color:#868c9b;opacity:.7;margin-top:3px;overflow-wrap:anywhere;}

.wt-wchart{display:flex;gap:8px;align-items:flex-end;padding:6px 2px 0;}
.wt-wcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;}
.wt-wbararea{width:100%;height:88px;display:flex;align-items:flex-end;}
.wt-wbarfill{width:100%;border-radius:6px 6px 3px 3px;transition:height .5s cubic-bezier(.2,.9,.3,1);min-height:3px;}
.wt-wnum{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:11px;color:#868c9b;height:13px;}
.wt-wlabel{font-size:11px;font-weight:700;color:#868c9b;}
.wt-wlabel.best{color:#f59e0b;}

.wt-ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.wt-ach{display:flex;align-items:center;gap:12px;padding:14px;border-radius:13px;border:1px solid #2a2f3a;transition:all .15s;}
.wt-ach.off{opacity:.55;}
.wt-ach.on{background:linear-gradient(135deg,rgba(251,191,36,0.1),transparent);border-color:rgba(251,191,36,0.35);}
.wt-ach-icon{width:42px;height:42px;flex-shrink:0;border-radius:11px;display:flex;align-items:center;justify-content:center;background:#1e222c;color:#868c9b;}
.wt-ach.on .wt-ach-icon{background:rgba(251,191,36,0.15);color:#fbbf24;}
.wt-ach-name{font-weight:700;font-size:14px;}
.wt-ach-desc{font-size:12px;color:#868c9b;margin-top:2px;}

.wt-foot{text-align:center;margin-top:16px;}
.wt-link{font-size:12px;color:#868c9b;text-decoration:underline;text-underline-offset:2px;}
.wt-link:hover{color:#e8eaf0;}
.wt-link.danger{color:#f87171;}

.wt-overlay{position:fixed;inset:0;background:rgba(6,8,12,0.7);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;animation:fade .18s ease;}
.wt-modal{background:#171a21;border:1px solid #2a2f3a;border-radius:18px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;animation:pop .22s cubic-bezier(.2,.9,.3,1.1);}
.wt-modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 18px 14px;border-bottom:1px solid #2a2f3a;}
.wt-modal-body{padding:18px;overflow-y:auto;}
.wt-modal-foot{padding:14px 18px;border-top:1px solid #2a2f3a;text-align:center;}
.wt-clear{font-size:13px;color:#f87171;font-weight:600;padding:6px 12px;border-radius:8px;transition:all .15s;}
.wt-clear:hover{background:rgba(248,113,113,0.1);}

.wt-type{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:12px;background:#1e222c;color:#868c9b;font-weight:700;font-size:14px;border:1px solid transparent;transition:all .15s;}
.wt-type:hover{color:#e8eaf0;}
.wt-type.on-work{background:rgba(251,146,60,0.15);color:#fb923c;border-color:rgba(251,146,60,0.5);}
.wt-type.on-rest{background:rgba(45,212,191,0.13);color:#2dd4bf;border-color:rgba(45,212,191,0.5);}

.wt-empty{text-align:center;font-size:13px;color:#868c9b;padding:16px;background:#1e222c;border-radius:11px;border:1px dashed #2a2f3a;margin-bottom:12px;}

.wt-ex{background:#1e222c;border-radius:13px;padding:13px;margin-bottom:12px;border:1px solid #2a2f3a;}
.wt-input{background:#0e1014;border:1px solid #2a2f3a;border-radius:9px;padding:9px 11px;color:#e8eaf0;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.wt-input:focus{border-color:#fb923c;}
.wt-input::placeholder{color:#868c9b;}
.wt-input.num{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;text-align:center;padding:8px 4px;}

.wt-setgrid{display:grid;grid-template-columns:34px 1fr 1fr 30px;gap:7px;align-items:center;margin-bottom:6px;}
.wt-sethead{margin-bottom:8px;}
.wt-sethead span{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:#868c9b;text-align:center;}
.wt-sethead span:first-child{text-align:left;}
.wt-setno{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:13px;color:#868c9b;text-align:center;}

.wt-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border-radius:10px;background:#1e222c;color:#e8eaf0;font-weight:600;font-size:13px;border:1px dashed #2a2f3a;transition:all .15s;}
.wt-add:hover{border-color:#fb923c;color:#fb923c;}
.wt-add.sm{padding:7px;margin-top:6px;font-size:12px;background:transparent;}

.wt-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#171a21;border:1px solid rgba(251,191,36,0.4);border-radius:14px;padding:13px 18px;display:flex;align-items:center;gap:12px;z-index:60;box-shadow:0 12px 40px rgba(0,0,0,0.5);animation:toastin .3s cubic-bezier(.2,.9,.3,1.1);}
.wt-toast-icon{width:38px;height:38px;border-radius:10px;background:rgba(251,191,36,0.15);color:#fbbf24;display:flex;align-items:center;justify-content:center;}

@keyframes flick{0%,100%{transform:scale(1) rotate(-1deg);}50%{transform:scale(1.08) rotate(1deg);}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(14px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

@media(max-width:560px){
  .wt-bignum{font-size:38px;}
  .wt-today{padding:10px 14px;}
}
@media(prefers-reduced-motion:reduce){
  .wt-flame,.wt-overlay,.wt-modal,.wt-toast,.wt-wbarfill{animation:none !important;transition:none !important;}
  .wt-cell:hover{transform:none;}
}

.wt-bignum.cold,.wt-flame.cold{color:#868c9b !important;}
.wt-hunit{font-size:16px;color:#868c9b;}
.wt-hicon{color:#fb923c;opacity:.55;}
.wt-mlabel{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#868c9b;}
.wt-mtitle{font-size:19px;font-weight:700;color:#e8eaf0;}
.wt-row-between{display:flex;justify-content:space-between;align-items:center;}
.wt-lbl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#868c9b;}
.wt-vol{font-family:ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;font-size:12px;color:#fb923c;}
.wt-notes-lbl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#868c9b;margin-bottom:8px;}

</style>
</head>
<body>
<div id="root"></div>
<script>

(function(){
"use strict";
var WORK="#fb923c",FLAME="#f59e0b",GOLD="#fbbf24",REST="#2dd4bf",MUTED="#868c9b";
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var DOW=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var WEEKDAYS=["S","M","T","W","T","F","S"];

function pad(n){return String(n).padStart(2,"0");}
function dateToKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function keyToDate(k){var p=k.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function todayKey(){return dateToKey(new Date());}
function isActive(v){return v&&(v.type==="workout"||v.type==="rest");}
function fmt(n){return Number(n).toLocaleString();}
function fmt1(n){return (Math.round(n*10)/10).toLocaleString();}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

var ICONS={
flame:{i:'<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>'},
moon:{i:'<path d="M12 3a6.36 6.36 0 0 0 9 9 9 9 0 1 1-9-9z"/>'},
calendar:{i:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/>'},
plus:{i:'<path d="M5 12h14M12 5v14"/>'},
x:{i:'<path d="M18 6 6 18M6 6l12 12"/>'},
chevL:{i:'<path d="m15 18-6-6 6-6"/>'},
chevR:{i:'<path d="m9 18 6-6-6-6"/>'},
trash:{i:'<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6"/>'},
award:{i:'<circle cx="12" cy="8" r="6"/><path d="M15.5 12.9 17 22l-5-3-5 3 1.5-9.1"/>'},
lock:{i:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'},
target:{i:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>'},
activity:{i:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'},
zap:{i:'<path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>'},
trophy:{i:'<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.7V17c0 .6-.5 1-1 1.2C7.9 18.8 7 20.2 7 22M14 14.7V17c0 .6.5 1 1 1.2 1.1.6 2 2 2 4.8M18 2H6v7a6 6 0 0 0 12 0V2z"/>'},
dumbbell:{f:1,i:'<rect x="1.5" y="9" width="3.5" height="6" rx="1"/><rect x="5" y="10.5" width="2.5" height="3"/><rect x="7.5" y="10.6" width="9" height="2.8"/><rect x="16.5" y="10.5" width="2.5" height="3"/><rect x="19" y="9" width="3.5" height="6" rx="1"/>'}
};
function svg(name,size){var ic=ICONS[name];var f=ic.f;return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="'+(f?"currentColor":"none")+'" stroke="'+(f?"none":"currentColor")+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ic.i+'</svg>';}

var ACH=[
{id:"first",name:"First Rep",desc:"Log your first workout",ic:"dumbbell",c:function(s){return s.totalWorkouts>=1;}},
{id:"s3",name:"Getting Going",desc:"Reach a 3-day streak",ic:"flame",c:function(s){return s.bestStreak>=3;}},
{id:"s7",name:"Week Strong",desc:"Reach a 7-day streak",ic:"flame",c:function(s){return s.bestStreak>=7;}},
{id:"s14",name:"Fortnight",desc:"Reach a 14-day streak",ic:"flame",c:function(s){return s.bestStreak>=14;}},
{id:"s30",name:"Monthly Master",desc:"Reach a 30-day streak",ic:"zap",c:function(s){return s.bestStreak>=30;}},
{id:"s100",name:"Century Streak",desc:"Reach a 100-day streak",ic:"zap",c:function(s){return s.bestStreak>=100;}},
{id:"w10",name:"Perfect 10",desc:"Log 10 workouts",ic:"target",c:function(s){return s.totalWorkouts>=10;}},
{id:"w25",name:"Quarter Ton",desc:"Log 25 workouts",ic:"target",c:function(s){return s.totalWorkouts>=25;}},
{id:"w50",name:"Half Century",desc:"Log 50 workouts",ic:"award",c:function(s){return s.totalWorkouts>=50;}},
{id:"w100",name:"Centurion",desc:"Log 100 workouts",ic:"trophy",c:function(s){return s.totalWorkouts>=100;}},
{id:"rest5",name:"Rest & Recover",desc:"Log 5 rest days",ic:"moon",c:function(s){return s.totalRest>=5;}},
{id:"balance",name:"Balanced",desc:"20 workouts + 5 rest days",ic:"activity",c:function(s){return s.totalWorkouts>=20&&s.totalRest>=5;}},
{id:"vol",name:"Heavy Day",desc:"10,000 total volume in one day",ic:"dumbbell",c:function(s){return s.maxDayVolume>=10000;}},
{id:"sets100",name:"Grinder",desc:"Log 100 total sets",ic:"target",c:function(s){return s.totalSets>=100;}}
];

function computeStats(days){
var totalWorkouts=0,totalRest=0,totalVolume=0,maxDayVolume=0,totalSets=0,totalReps=0,heaviestSet=0,heaviestSetEx="";
var exCount={},exDisplay={},weekday=[0,0,0,0,0,0,0];
for(var k in days){var v=days[k];
 if(v.type==="workout"){totalWorkouts++;weekday[keyToDate(k).getDay()]++;}
 if(v.type==="rest")totalRest++;
 var dayVol=0,ex=v.exercises||[];
 for(var a=0;a<ex.length;a++){var nm=(ex[a].name||"").trim();
  if(nm){var key=nm.toLowerCase();exCount[key]=(exCount[key]||0)+1;if(!exDisplay[key])exDisplay[key]=nm;}
  var sets=ex[a].sets||[];
  for(var b=0;b<sets.length;b++){var w=Number(sets[b].weight)||0,r=Number(sets[b].reps)||0;
   if(r>0){totalSets++;totalReps+=r;}dayVol+=w*r;if(w>heaviestSet){heaviestSet=w;heaviestSetEx=nm;}}
 }
 totalVolume+=dayVol;if(dayVol>maxDayVolume)maxDayVolume=dayVol;
}
var active=Object.keys(days).filter(function(k){return isActive(days[k]);}).sort();
var best=0,run=0,prev=null;
for(var i=0;i<active.length;i++){var d=keyToDate(active[i]);run=prev&&(d-prev)/864e5===1?run+1:1;if(run>best)best=run;prev=d;}
var current=0,tk=todayKey(),yk=dateToKey(addDays(new Date(),-1));
if(active.length){var last=active[active.length-1];if(last===tk||last===yk){current=1;var cur=keyToDate(last);while(isActive(days[dateToKey(addDays(cur,-1))])){current++;cur=addDays(cur,-1);}}}
var now=new Date();var weekStart=addDays(new Date(now.getFullYear(),now.getMonth(),now.getDate()),-now.getDay());
var thisWeek=0,thisMonth=0;
for(var k2 in days){if(days[k2].type!=="workout")continue;var dd=keyToDate(k2);if(dd>=weekStart)thisWeek++;if(dd.getFullYear()===now.getFullYear()&&dd.getMonth()===now.getMonth())thisMonth++;}
var daysTracked=0;if(active.length)daysTracked=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate())-keyToDate(active[0]))/864e5)+1;
var weeksTracked=Math.max(1,daysTracked/7);
var uniqueExercises=Object.keys(exCount).length,favEx="\u2014",favCount=0;
for(var key3 in exCount){if(exCount[key3]>favCount){favCount=exCount[key3];favEx=exDisplay[key3];}}
var maxWd=Math.max.apply(null,weekday),bestIdx=maxWd>0?weekday.indexOf(maxWd):-1;
return {totalWorkouts:totalWorkouts,totalRest:totalRest,totalVolume:totalVolume,maxDayVolume:maxDayVolume,
 totalSets:totalSets,totalReps:totalReps,heaviestSet:heaviestSet,heaviestSetEx:heaviestSetEx,
 bestStreak:best,currentStreak:current,activeDays:active.length,thisWeek:thisWeek,thisMonth:thisMonth,
 daysTracked:daysTracked,avgPerWeek:totalWorkouts/weeksTracked,uniqueExercises:uniqueExercises,favEx:favEx,
 weekday:weekday,maxWd:maxWd,bestIdx:bestIdx,bestWeekday:bestIdx>=0?DOW[bestIdx]:"\u2014",
 restRatio:totalRest>0?totalWorkouts/totalRest:totalWorkouts,
 avgVolPerWorkout:totalWorkouts?totalVolume/totalWorkouts:0,
 avgSetsPerWorkout:totalWorkouts?totalSets/totalWorkouts:0};
}
function streakKeys(days){var set={};var active=Object.keys(days).filter(function(k){return isActive(days[k]);}).sort();
 if(!active.length)return set;var tk=todayKey(),yk=dateToKey(addDays(new Date(),-1));var last=active[active.length-1];
 if(last!==tk&&last!==yk)return set;var cur=keyToDate(last);while(isActive(days[dateToKey(cur)])){set[dateToKey(cur)]=1;cur=addDays(cur,-1);}return set;}

// ---------- state ----------
var state={days:{},settings:{unit:"lbs"},view:"calendar",selected:null,confirmReset:false};
var now0=new Date();state.month={y:now0.getFullYear(),m:now0.getMonth()};
var prevUnlocked=null,saveTimer=null,toastTimer=null,curToast=null;
var KEY="workout-tracker-data";

function load(){try{var raw=localStorage.getItem(KEY);if(raw){var d=JSON.parse(raw);if(d.days)state.days=d.days;if(d.settings)state.settings=d.settings;}}catch(e){}}
function save(){try{clearTimeout(saveTimer);saveTimer=setTimeout(function(){localStorage.setItem(KEY,JSON.stringify({days:state.days,settings:state.settings}));},250);}catch(e){}}
function unit(){return state.settings.unit||"lbs";}

function checkAch(stats){var unlocked=ACH.filter(function(a){return a.c(stats);}).map(function(a){return a.id;});
 if(prevUnlocked===null){prevUnlocked=unlocked;return;}
 var fresh=unlocked.filter(function(id){return prevUnlocked.indexOf(id)<0;});prevUnlocked=unlocked;
 if(fresh.length){var a=null;for(var i=0;i<ACH.length;i++)if(ACH[i].id===fresh[0])a=ACH[i];curToast=a;renderToast();clearTimeout(toastTimer);toastTimer=setTimeout(function(){curToast=null;renderToast();},3500);}}

// ---------- render ----------
function scard(label,value,sub,accent,txt){return '<div class="wt-scard"><div class="wt-sval'+(txt?" txt":"")+'"'+(accent?' style="color:'+accent+'"':"")+'>'+value+'</div><div class="wt-slabel">'+esc(label)+'</div>'+(sub?'<div class="wt-ssub">'+esc(sub)+'</div>':"")+'</div>';}

function heroHTML(s){var cold=s.currentStreak>0?"":" cold";
 return '<div class="wt-hero"><div class="wt-hero-main"><div class="wt-flamewrap"><span class="wt-flame'+cold+'" style="color:'+(s.currentStreak>0?FLAME:MUTED)+'">'+svg("flame",30)+'</span></div>'
 +'<div><div class="wt-bignum'+cold+'" style="color:'+(s.currentStreak>0?FLAME:MUTED)+'">'+s.currentStreak+'</div><div class="wt-biglabel">day streak</div></div></div>'
 +'<button class="wt-today" data-action="today">'+svg("plus",17)+' Log today</button></div>';}

function tabsHTML(){var uc=ACH.filter(function(a){return a.c(computeStats(state.days));}).length;
 function tab(v,ic,lbl,extra){return '<button class="wt-tab'+(state.view===v?" active":"")+'" data-action="tab" data-view="'+v+'">'+svg(ic,16)+' '+lbl+(extra||"")+'</button>';}
 return '<div class="wt-tabs">'+tab("calendar","calendar","Calendar")+tab("stats","activity","Statistics")
 +tab("achievements","trophy","Awards",' <span class="wt-badge">'+uc+'/'+ACH.length+'</span>')
 +'<button class="wt-unit" data-action="unit">'+esc(unit())+'</button></div>';}

function calHTML(){var y=state.month.y,m=state.month.m;
 var daysInMonth=new Date(y,m+1,0).getDate(),lead=new Date(y,m,1).getDay(),tk=todayKey(),ss=streakKeys(state.days);
 var mw=0;for(var k in state.days){var x=keyToDate(k);if(state.days[k].type==="workout"&&x.getFullYear()===y&&x.getMonth()===m)mw++;}
 var h='<div class="wt-card"><div class="wt-cal-head"><button class="wt-icon" data-action="prev">'+svg("chevL",18)+'</button>'
 +'<div class="wt-monthlabel">'+MONTHS[m]+' '+y+'<span class="wt-monthsub">'+mw+' workouts</span></div>'
 +'<button class="wt-icon" data-action="next">'+svg("chevR",18)+'</button></div><div class="wt-weekrow">';
 for(var i=0;i<7;i++)h+='<div class="wt-weekday">'+WEEKDAYS[i]+'</div>';
 h+='</div><div class="wt-grid">';
 for(var b=0;b<lead;b++)h+='<div class="wt-cell empty"></div>';
 for(var d=1;d<=daysInMonth;d++){var key=dateToKey(new Date(y,m,d)),day=state.days[key],t=day?day.type:null;
  var cls="wt-cell "+(t||"")+(key===tk?" today":"")+(ss[key]?" instreak":"");
  var hasLog=day&&((day.exercises&&day.exercises.some(function(e){return e.sets&&e.sets.length;}))||day.notes);
  h+='<button class="'+cls+'" data-action="day" data-key="'+key+'"><span class="wt-daynum">'+d+'</span>';
  if(t==="workout")h+='<span class="wt-cellicon" style="color:'+WORK+'">'+svg("dumbbell",12)+'</span>';
  if(t==="rest")h+='<span class="wt-cellicon" style="color:'+REST+'">'+svg("moon",12)+'</span>';
  if(hasLog)h+='<span class="wt-dot"></span>';
  h+='</button>';}
 h+='</div><div class="wt-legend"><span><i class="lg work"></i> Workout</span><span><i class="lg rest"></i> Rest</span><span><i class="lg streak"></i> In current streak</span></div></div>';
 return h;}

function statsHTML(){var s=computeStats(state.days),u=unit();
 var h='<div class="wt-card">';
 if(!s.activeDays)h+='<div class="wt-empty" style="margin-bottom:18px">No data yet. Log a few workouts and your stats will fill in here.</div>';
 h+='<div class="wt-highlight"><div><div class="wt-hval">'+fmt(s.totalVolume)+' <span class="wt-hunit">'+esc(u)+'</span></div><div class="wt-hlabel">Total weight lifted</div></div><span class="wt-hicon">'+svg("dumbbell",40)+'</span></div>';
 h+='<div class="wt-section"><div class="wt-section-title">'+svg("activity",14)+' Training by day of week</div><div class="wt-wchart">';
 for(var i=0;i<7;i++){var c=s.weekday[i];var ht=s.maxWd?Math.max(4,(c/s.maxWd)*100):0;var col=i===s.bestIdx?FLAME:WORK;
  h+='<div class="wt-wcol"><div class="wt-wbararea"><div class="wt-wbarfill" style="height:'+ht+'%;background:'+col+'"></div></div><div class="wt-wnum">'+(c||"")+'</div><div class="wt-wlabel'+(i===s.bestIdx?" best":"")+'">'+WEEKDAYS[i]+'</div></div>';}
 h+='</div></div>';
 h+='<div class="wt-section"><div class="wt-section-title">'+svg("flame",14)+' Consistency</div><div class="wt-sgrid">'
 +scard("Current streak",s.currentStreak,"days",FLAME)+scard("Best streak",s.bestStreak,"days",GOLD)
 +scard("Avg per week",fmt1(s.avgPerWeek),"workouts",WORK)+scard("This week",s.thisWeek,"workouts",WORK)
 +scard("This month",s.thisMonth,"workouts",WORK)+scard("Total workouts",s.totalWorkouts,null,WORK)
 +scard("Rest days",s.totalRest,null,REST)+scard("Days tracked",s.daysTracked,"since day one",null)
 +scard("Best day",esc(s.bestWeekday),"you train most",null,true)+scard("Work : rest",fmt1(s.restRatio)+" : 1",null,null,true)
 +'</div></div>';
 h+='<div class="wt-section"><div class="wt-section-title">'+svg("dumbbell",14)+' Lifting</div><div class="wt-sgrid">'
 +scard("Total reps",fmt(s.totalReps),null,null)+scard("Total sets",fmt(s.totalSets),null,null)
 +scard("Avg volume / workout",fmt(Math.round(s.avgVolPerWorkout)),u,WORK)+scard("Avg sets / workout",fmt1(s.avgSetsPerWorkout),null,null)
 +scard("Heaviest set",fmt(s.heaviestSet)+" "+u,s.heaviestSetEx||"\u2014",GOLD)+scard("Biggest day",fmt(s.maxDayVolume),u+" volume",WORK)
 +scard("Unique exercises",s.uniqueExercises,null,null)+scard("Favorite lift",esc(s.favEx),"most logged",null,true)
 +'</div></div></div>';
 return h;}

function achHTML(){var s=computeStats(state.days);var h='<div class="wt-card"><div class="wt-ach-grid">';
 for(var i=0;i<ACH.length;i++){var a=ACH[i],on=a.c(s);
  h+='<div class="wt-ach '+(on?"on":"off")+'"><div class="wt-ach-icon">'+svg(on?a.ic:"lock",on?22:18)+'</div><div style="min-width:0"><div class="wt-ach-name">'+esc(a.name)+'</div><div class="wt-ach-desc">'+esc(a.desc)+'</div></div></div>';}
 h+='</div></div>';return h;}

function footHTML(){return '<div class="wt-foot">'+(state.confirmReset
 ?'Erase all data? <button class="wt-link danger" data-action="reset-yes">Yes, reset</button> \u00b7 <button class="wt-link" data-action="reset-no">Cancel</button>'
 :'<button class="wt-link" data-action="reset">Reset all data</button>')+'</div>';}

function dayVolOf(day){var v=0,ex=(day&&day.exercises)||[];for(var a=0;a<ex.length;a++){var st=ex[a].sets||[];for(var b=0;b<st.length;b++)v+=(Number(st[b].weight)||0)*(Number(st[b].reps)||0);}return v;}

function modalHTML(){if(!state.selected)return "";var key=state.selected,day=state.days[key]||{type:null,notes:"",exercises:[]};
 var d=keyToDate(key),lbl=d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}),u=unit(),t=day.type;
 var h='<div class="wt-overlay" id="wt-overlay"><div class="wt-modal"><div class="wt-modal-head"><div><div class="wt-mlabel">Log for</div><div class="wt-mtitle">'+esc(lbl)+'</div></div><button class="wt-icon" data-action="close">'+svg("x",18)+'</button></div><div class="wt-modal-body">';
 h+='<div style="display:flex;gap:10px;margin-bottom:18px"><button class="wt-type'+(t==="workout"?" on-work":"")+'" data-action="type" data-type="workout">'+svg("dumbbell",18)+' Workout</button><button class="wt-type'+(t==="rest"?" on-rest":"")+'" data-action="type" data-type="rest">'+svg("moon",18)+' Rest day</button></div>';
 if(t==="workout"){var ex=day.exercises||[];
  h+='<div style="margin-bottom:18px"><div class="wt-row-between" style="margin-bottom:10px"><span class="wt-lbl">Exercises</span><span class="wt-vol" id="wt-dayvol"></span></div>';
  if(!ex.length)h+='<div class="wt-empty">No exercises yet. Add your first lift below.</div>';
  for(var i=0;i<ex.length;i++){h+='<div class="wt-ex"><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><input class="wt-input" style="flex:1" placeholder="Exercise (e.g. Bench Press)" data-field="ex-name" data-i="'+i+'"><button class="wt-icon sm" data-action="rm-ex" data-i="'+i+'">'+svg("trash",15)+'</button></div>';
   h+='<div class="wt-setgrid wt-sethead"><span>Set</span><span>Weight ('+esc(u)+')</span><span>Reps</span><span></span></div>';
   var sets=ex[i].sets||[];
   for(var j=0;j<sets.length;j++){h+='<div class="wt-setgrid"><span class="wt-setno">'+(j+1)+'</span><input class="wt-input num" inputmode="decimal" placeholder="0" data-field="weight" data-i="'+i+'" data-si="'+j+'"><input class="wt-input num" inputmode="numeric" placeholder="0" data-field="reps" data-i="'+i+'" data-si="'+j+'"><button class="wt-icon xs" data-action="rm-set" data-i="'+i+'" data-si="'+j+'">'+svg("x",13)+'</button></div>';}
   h+='<button class="wt-add sm" data-action="add-set" data-i="'+i+'">'+svg("plus",14)+' Add set</button></div>';}
  h+='<button class="wt-add" data-action="add-ex">'+svg("plus",16)+' Add exercise</button></div>';
 }
 h+='<div><div class="wt-notes-lbl">Notes</div><textarea class="wt-input" rows="3" data-field="notes" placeholder="'+(t==="rest"?"How you recovered \u2014 stretching, walk, sleep\u2026":"How it felt, PRs, energy, what you trained\u2026")+'" style="resize:vertical;width:100%"></textarea></div>';
 h+='</div>';
 if(t||day.notes)h+='<div class="wt-modal-foot"><button class="wt-clear" data-action="clear">Clear this day</button></div>';
 h+='</div></div>';
 return h;}

function fillModalValues(){if(!state.selected)return;var day=state.days[state.selected]||{};var ex=day.exercises||[];
 var root=document.getElementById("wt-modal");if(!root)return;
 root.querySelectorAll('[data-field="ex-name"]').forEach(function(el){el.value=(ex[+el.dataset.i]&&ex[+el.dataset.i].name)||"";});
 root.querySelectorAll('[data-field="weight"]').forEach(function(el){var s=ex[+el.dataset.i]&&ex[+el.dataset.i].sets[+el.dataset.si];el.value=s?s.weight:"";});
 root.querySelectorAll('[data-field="reps"]').forEach(function(el){var s=ex[+el.dataset.i]&&ex[+el.dataset.i].sets[+el.dataset.si];el.value=s?s.reps:"";});
 var nt=root.querySelector('[data-field="notes"]');if(nt)nt.value=day.notes||"";
 updateDayVol();}

function updateDayVol(){var el=document.getElementById("wt-dayvol");if(!el||!state.selected)return;var v=dayVolOf(state.days[state.selected]);el.textContent=v>0?fmt(v)+" "+unit()+" volume":"";}

function viewHTML(){if(state.view==="calendar")return calHTML();if(state.view==="stats")return statsHTML();return achHTML();}

function renderMain(){var s=computeStats(state.days);document.getElementById("wt-main").innerHTML=heroHTML(s)+tabsHTML()+viewHTML()+footHTML();}
function renderModal(){document.getElementById("wt-modal").innerHTML=modalHTML();fillModalValues();}
function renderToast(){document.getElementById("wt-toast").innerHTML=curToast?'<div class="wt-toast"><div class="wt-toast-icon">'+svg("trophy",18)+'</div><div><div style="font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:'+GOLD+'">Achievement unlocked</div><div style="font-weight:700;font-size:14px">'+esc(curToast.name)+'</div></div></div>':"";}
function render(){renderMain();renderModal();renderToast();}

function ensureDay(key){if(!state.days[key])state.days[key]={type:null,notes:"",exercises:[]};return state.days[key];}

// ---------- events ----------
function onClick(e){var el=e.target.closest?e.target.closest("[data-action]"):null;
 if(e.target&&e.target.id==="wt-overlay"){state.selected=null;render();return;}
 if(!el)return;var act=el.dataset.action,key=state.selected;
 if(act==="tab"){state.view=el.dataset.view;renderMain();}
 else if(act==="unit"){state.settings.unit=unit()==="lbs"?"kg":"lbs";save();render();}
 else if(act==="today"){state.selected=todayKey();renderModal();}
 else if(act==="prev"){state.month.m--;if(state.month.m<0){state.month.m=11;state.month.y--;}renderMain();}
 else if(act==="next"){state.month.m++;if(state.month.m>11){state.month.m=0;state.month.y++;}renderMain();}
 else if(act==="day"){state.selected=el.dataset.key;renderModal();}
 else if(act==="close"){state.selected=null;render();}
 else if(act==="reset"){state.confirmReset=true;renderMain();}
 else if(act==="reset-no"){state.confirmReset=false;renderMain();}
 else if(act==="reset-yes"){state.days={};state.confirmReset=false;save();checkAch(computeStats(state.days));render();}
 else if(act==="type"){var day=ensureDay(key);day.type=el.dataset.type;if(day.type==="rest")day.exercises=[];else if(!day.exercises)day.exercises=[];save();checkAch(computeStats(state.days));renderModal();}
 else if(act==="add-ex"){var day2=ensureDay(key);day2.type="workout";if(!day2.exercises)day2.exercises=[];day2.exercises.push({name:"",sets:[{weight:"",reps:""}]});save();renderModal();}
 else if(act==="rm-ex"){var day3=state.days[key];if(day3)day3.exercises.splice(+el.dataset.i,1);save();checkAch(computeStats(state.days));renderModal();}
 else if(act==="add-set"){var day4=state.days[key];if(day4)day4.exercises[+el.dataset.i].sets.push({weight:"",reps:""});save();renderModal();}
 else if(act==="rm-set"){var day5=state.days[key];if(day5)day5.exercises[+el.dataset.i].sets.splice(+el.dataset.si,1);save();checkAch(computeStats(state.days));renderModal();}
 else if(act==="clear"){delete state.days[key];state.selected=null;save();checkAch(computeStats(state.days));render();}
}
function onInput(e){var el=e.target;var f=el.dataset?el.dataset.field:null;if(!f||!state.selected)return;var key=state.selected,day=ensureDay(key);
 if(f==="notes"){day.notes=el.value;save();return;}
 day.type="workout";if(!day.exercises)day.exercises=[];var i=+el.dataset.i;
 if(f==="ex-name"){if(day.exercises[i])day.exercises[i].name=el.value;save();return;}
 var si=+el.dataset.si;if(day.exercises[i]&&day.exercises[i].sets[si]){day.exercises[i].sets[si][f==="weight"?"weight":"reps"]=el.value;}
 save();updateDayVol();
}

function init(){var root=document.getElementById("root");
 root.innerHTML='<div class="wt-root" id="wt"><div id="wt-main"></div><div id="wt-modal"></div><div id="wt-toast"></div></div>';
 var wt=document.getElementById("wt");wt.addEventListener("click",onClick);wt.addEventListener("input",onInput);
 load();prevUnlocked=ACH.filter(function(a){return a.c(computeStats(state.days));}).map(function(a){return a.id;});
 render();}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init);else init();
})();

</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
